<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220" width="200" height="220">
  <!-- Rikugan icon: cyberpunk anime girl with VR visor, face mask, bob hair -->
  <g fill="none" stroke="#e0e0e0" stroke-linecap="round" stroke-linejoin="round">

    <!-- Hair — bob cut, shoulder length, back layer -->
    <!-- Left side hair strands -->
    <path d="M42 80 C38 110 36 140 40 170 C42 178 48 182 52 180" stroke-width="3"/>
    <path d="M48 78 C44 108 42 138 44 168 C46 174 50 176 54 175" stroke-width="2.5"/>
    <path d="M55 76 C52 105 50 135 51 162 C52 168 55 170 58 168" stroke-width="2.2"/>
    <!-- Right side hair strands -->
    <path d="M158 80 C162 110 164 140 160 170 C158 178 152 182 148 180" stroke-width="3"/>
    <path d="M152 78 C156 108 158 138 156 168 C154 174 150 176 146 175" stroke-width="2.5"/>
    <path d="M145 76 C148 105 150 135 149 162 C148 168 145 170 142 168" stroke-width="2.2"/>

    <!-- Hair — top dome outline -->
    <path d="M42 80 C40 50 55 22 100 18 C145 22 160 50 158 80" stroke-width="3.5"/>

    <!-- Hair — bangs (chunky sections falling over visor) -->
    <!-- Left bang group -->
    <path d="M52 76 C54 60 60 42 72 30" stroke-width="2.8"/>
    <path d="M58 78 C60 62 65 46 76 34" stroke-width="2.4"/>
    <path d="M66 80 C67 64 70 48 80 36" stroke-width="2.2"/>
    <!-- Center bangs -->
    <path d="M76 82 C78 66 82 48 90 32" stroke-width="2.4"/>
    <path d="M86 84 C88 68 92 50 98 30" stroke-width="2.2"/>
    <!-- Right bang group -->
    <path d="M106 82 C108 66 112 48 118 34" stroke-width="2.4"/>
    <path d="M118 80 C120 64 124 48 132 36" stroke-width="2.2"/>
    <path d="M130 78 C132 62 136 46 142 34" stroke-width="2.4"/>
    <path d="M140 76 C142 60 144 44 148 32" stroke-width="2.8"/>

    <!-- Face outline — oval with soft chin -->
    <path d="M52 80 C50 100 50 115 54 130 C60 145 78 160 100 164 C122 160 140 145 146 130 C150 115 150 100 148 80" stroke-width="3"/>

    <!-- VR Visor / Goggles — wraparound band across eyes -->
    <path d="M36 88 C36 82 42 76 52 76 L148 76 C158 76 164 82 164 88 L164 108 C164 114 158 120 148 120 L52 120 C42 120 36 114 36 108 Z" stroke-width="3"/>
    <!-- Visor bridge/nose indent -->
    <path d="M92 120 C96 126 104 126 108 120" stroke-width="2.5"/>

    <!-- Eyes — circular, visible through visor -->
    <!-- Left eye -->
    <circle cx="72" cy="98" r="16" stroke-width="2.5"/>
    <circle cx="72" cy="98" r="11" stroke-width="2"/>
    <!-- Right eye -->
    <circle cx="128" cy="98" r="16" stroke-width="2.5"/>
    <circle cx="128" cy="98" r="11" stroke-width="2"/>

    <!-- Eye detail — upper eyelid lines -->
    <path d="M56 88 C62 84 72 82 82 86" stroke-width="2"/>
    <path d="M118 86 C126 82 136 84 144 88" stroke-width="2"/>

    <!-- Eye highlights -->
    <circle cx="66" cy="92" r="4" stroke-width="1.5"/>
    <circle cx="122" cy="92" r="4" stroke-width="1.5"/>

    <!-- Earpieces — small rounded rectangles on sides -->
    <rect x="30" y="92" width="12" height="24" rx="5" stroke-width="2.5"/>
    <rect x="158" y="92" width="12" height="24" rx="5" stroke-width="2.5"/>

    <!-- Face mask — covers lower face -->
    <path d="M54 126 C54 122 58 118 66 118 L134 118 C142 118 146 122 146 126 L146 142 C146 148 138 158 100 162 C62 158 54 148 54 142 Z" stroke-width="3"/>

    <!-- Mask top edge detail -->
    <path d="M66 118 L134 118" stroke-width="1.5"/>

    <!-- Small nose hint above mask -->
    <path d="M96 124 C98 128 102 128 104 124" stroke-width="2"/>

  </g>

  <!-- Visor hex text -->
  <text x="62" y="102" fill="#e0e0e0" font-family="monospace" font-size="9" font-weight="bold" letter-spacing="0.5">0x4A</text>
  <text x="88" y="102" fill="#e0e0e0" font-family="monospace" font-size="9" font-weight="bold" letter-spacing="0.5">0..FFF</text>
  <text x="124" y="102" fill="#e0e0e0" font-family="monospace" font-size="9" font-weight="bold" letter-spacing="0.5">0x2B</text>
</svg>
