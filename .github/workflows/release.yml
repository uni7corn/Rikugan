name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  validate-and-release:
    name: Validate & Publish
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate tag matches plugin.json version
        run: |
          TAG=${GITHUB_REF#refs/tags/v}
          VERSION=$(python -c "import json; print(json.load(open('plugin.json'))['version'])")
          echo "Tag: $TAG  |  plugin.json: $VERSION"
          if [ "$TAG" != "$VERSION" ]; then
            echo "ERROR: tag v$TAG does not match plugin.json version $VERSION"
            exit 1
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
